# Build MCUboot together with the application when west is run with --sysbuild.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Use primary/secondary slot swapping without a scratch partition. This keeps
# rollback support through MCUboot's test/confirm flow.
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_OFFSET=y
