# SPDX-License-Identifier: Apache-2.0

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SHELL_LOG_BACKEND=n

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="ArgiSense USB-C Shell Console"
CONFIG_CDC_ACM_SERIAL_PID=0x0004

CONFIG_USBD_LOG_LEVEL_DBG=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_DBG=y
CONFIG_UDC_DRIVER_LOG_LEVEL_DBG=y
CONFIG_STM32_USB_COMMON_LOG_LEVEL_DBG=y

# Keep the USB-C debug console enumerated during bring-up.
# The production build can keep PM enabled; the USB console build is a debug
# profile where STOP/deep idle would make the host lose the CDC ACM device.
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_PM_DEVICE_SYSTEM_MANAGED=n
CONFIG_PM_NEED_ALL_DEVICES_IDLE=n
