# Console, logging, and shell on CDC ACM 0.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SHELL_LOG_BACKEND=n

# USB device-next composite init is owned by app/src/argisense_usb.c so both
# CDC ACM instances are registered. The built-in CDC auto-init only registers
# the first CDC ACM instance.
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_ARGISENSE_USB_DEVICE=y
CONFIG_ARGISENSE_USB_MANUFACTURER_STRING="ArgiSense"
CONFIG_ARGISENSE_USB_PRODUCT_STRING="ArgiSense USB-C Console and Firmware Update"
CONFIG_ARGISENSE_USB_PID=0x0005

# MCUmgr SMP firmware update transport on CDC ACM 1.
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_UART_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_UART_MTU=256
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_IMG_SLOT_INFO=y
CONFIG_MCUMGR_GRP_IMG_VERSION_CMP_USE_BUILD_NUMBER=y
CONFIG_MCUMGR_GRP_OS=y

# Zephyr img_mgmt reports the optional upload "match" check as an error when
# the uploaded file hash and MCUboot image hash differ, even though the image is
# still accepted and can boot. Keep RS485 DFU verification enabled globally, but
# silence this USB-C MCUmgr-only diagnostic noise on the console port.
CONFIG_MCUMGR_GRP_IMG_LOG_LEVEL_OFF=y

# The main image already enables these in the MCUboot sysbuild fragment. Keep
# them here so non-sysbuild experiments fail less mysteriously.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_REBOOT=y

CONFIG_USBD_LOG_LEVEL_INF=y
CONFIG_UDC_DRIVER_LOG_LEVEL_INF=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y

# Keep the USB-C console/update device enumerated during bring-up.
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_PM_DEVICE_SYSTEM_MANAGED=n
CONFIG_PM_NEED_ALL_DEVICES_IDLE=n
