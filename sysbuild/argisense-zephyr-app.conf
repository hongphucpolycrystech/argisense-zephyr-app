# Main image settings needed for MCUboot test/confirm and future DFU writes.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ENABLE_IMAGE_CHECK=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_ARGISENSE_RS485_DFU=y

# Match MCUboot's CONFIG_MCUBOOT_DOWNGRADE_PREVENTION setting.
CONFIG_MCUBOOT_BOOTLOADER_NO_DOWNGRADE=y
